[pytest]
# Автоматически распознает все функции 'async def test_...' как асинхронные тесты
asyncio_mode = auto

# Определяет "время жизни" цикла событий. 
# 'session' означает, что один цикл (loop) создается на весь запуск тестов.
# Это критично для работы с базой данных в памяти или общими фикстурами.
asyncio_default_test_loop_scope = session
