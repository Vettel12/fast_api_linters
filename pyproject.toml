[tool.ruff]
line-length = 88 # Максимальная длина строки кода (стандарт Black/Ruff)
target-version = "py313" # Оптимизировать проверки под возможности Python 3.13

[tool.ruff.lint]
# Список категорий проверок, которые Ruff будет включать
select = [
    "E", "W",  # Ошибки оформления и ворнинги (замена классического Flake8)
    "F",        # Логические ошибки: неиспользуемые переменные, ошибки импорта (Pyflakes)
    "I",        # Автоматическая сортировка импортов (замена isort)
    "B",        # Поиск потенциальных багов и уязвимостей (flake8-bugbear)
    "C90",      # Проверка цикломатической сложности (чтобы функции не были слишком запутанными)
]

[tool.mypy]
python_version = "3.13" # Проверять типы в соответствии с синтаксисом Python 3.13
strict = true # Включить максимально строгую проверку (все функции должны иметь типы)
ignore_missing_imports = true # Не ругаться, если у сторонней библиотеки нет файлов с типами
disallow_untyped_decorators = false # Разрешить декораторы без типов (нужно для FastAPI и pytest)
# Подключаем спец. плагины, чтобы mypy понимал магию Pydantic и SQLAlchemy
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]

[tool.pytest.ini_options]
testpaths = ["tests"] # Где искать файлы с тестами
python_files = "test_*.py" # Шаблон названий файлов, которые считаются тестами
asyncio_mode = "auto" # Автоматически запускать async-функции в цикле событий
asyncio_default_fixture_loop_scope = "session" # Жизненный цикл базы данных для тестов — вся сессия
